services:
  - type: web
    name: finsight-backend
    runtime: node
    rootDir: finsight-expense-tracker/backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://finalexpensive.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: finsight-db
          property: connectionString

databases:
  - name: finsight-db
    plan: free
    databaseName: finsight_db
